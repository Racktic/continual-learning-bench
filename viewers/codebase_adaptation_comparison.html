<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codebase Adaptation Comparison</title>
<style>
:root { --bg:#f6f7f9; --panel:#fff; --ink:#172026; --muted:#667085; --line:#d9dee7; --accent:#0f766e; --bad:#b42318; --good:#067647; --blue:#2563eb; }
* { box-sizing:border-box; }
body { margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--ink); }
main { max-width:1500px; margin:0 auto; padding:24px; }
h1 { margin:0 0 6px; font-size:28px; letter-spacing:0; }
p { margin:0; color:var(--muted); }
.header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:20px; }
.controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
input { height:36px; min-width:260px; border:1px solid var(--line); border-radius:6px; padding:0 10px; background:white; color:var(--ink); }
button { height:36px; border:1px solid var(--line); border-radius:6px; background:white; padding:0 12px; cursor:pointer; color:var(--ink); }
button.active { background:var(--accent); color:white; border-color:var(--accent); }
.grid { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; margin-bottom:16px; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:14px; box-shadow:0 1px 2px rgba(16,24,40,.04); }
.metric-label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
.metric-value { font-size:24px; font-weight:700; margin-top:4px; }
.metric-sub { color:var(--muted); font-size:13px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.table-wrap { overflow:auto; background:var(--panel); border:1px solid var(--line); border-radius:8px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:var(--panel); }
th { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; cursor:pointer; background:#fbfcfe; }
tr:hover td { background:#f8fafc; }
.name { font-weight:650; }
.sub { color:var(--muted); font-size:12px; margin-top:2px; }
.pos { color:var(--good); } .neg { color:var(--bad); }
.section { margin-top:18px; }
.section h2 { margin:0 0 10px; font-size:17px; }
.chart { height:360px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px; }
svg { width:100%; height:100%; display:block; }
.legend { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 0; font-size:12px; color:var(--muted); }
.legend-item { display:inline-flex; align-items:center; gap:6px; height:28px; border:1px solid var(--line); border-radius:999px; background:white; padding:0 9px; color:var(--muted); cursor:pointer; user-select:none; }
.legend-item.hidden { opacity:.45; text-decoration:line-through; }
.legend-ctl { border-style:dashed; color:var(--blue); font-weight:600; }
.legend-item:focus-visible { outline:2px solid var(--blue); outline-offset:2px; }
.swatch { display:inline-block; width:10px; height:10px; border-radius:2px; flex:0 0 auto; }
@media(max-width:900px) { .header { flex-direction:column; } .grid { grid-template-columns:1fr 1fr; } main { padding:14px; } }
</style>
</head>
<body>
<main>
  <div class="header">
    <div>
      <h1>Codebase Adaptation Comparison</h1>
      <p>Final results plus local qwen3.5-9B runs (icl / icl_summary replace / icl_summary augment). Cumulative values are sums over the 19-instance schedule.</p>
    </div>
    <div class="controls">
      <input id="filter" placeholder="Filter systems">
      <button id="sortReward" class="active">Sort Reward</button>
      <button id="sortGain">Sort Gain</button>
    </div>
  </div>
  <div class="grid" id="metrics"></div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th data-sort="label">System</th><th data-sort="cumReward">Cum Reward</th><th data-sort="cumRewardStd">Reward Std</th><th data-sort="cumGain">Cum Gain</th><th data-sort="cumGainStd">Gain Std</th><th data-sort="runs">Runs</th><th data-sort="avgResponseSeconds">Avg Response</th><th>Schedule</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table></div>
  <div class="section"><h2>Mean Reward By Index</h2><div class="chart"><svg id="rewardChart"></svg></div><div class="legend" id="rewardLegend"></div></div>
  <div class="section"><h2>Mean Gain By Index</h2><div class="chart"><svg id="gainChart"></svg></div><div class="legend" id="gainLegend"></div></div>
</main>

<script>
const records = JSON.parse(document.getElementById('data').textContent);
const colors = ['#0f766e','#2563eb','#9333ea','#dc6803','#c026d3','#16a34a','#b42318','#475467','#0891b2','#7c3aed','#ea580c','#0e7490','#be123c'];
const colorById = new Map(records.map((r,i)=>[r.id, colors[i%colors.length]]));
const hiddenSeries = new Set();
let sortKey = 'cumReward';
let sortDir = -1;
const filterEl = document.getElementById('filter');
function escapeHtml(v) { return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(v,d=3) { return v === null || v === undefined || Number.isNaN(Number(v)) ? 'n/a' : Number(v).toFixed(d); }
function signed(v,d=3) { if (v === null || v === undefined || Number.isNaN(Number(v))) return 'n/a'; const n=Number(v); return (n>=0?'+':'') + n.toFixed(d); }
function cls(v) { return Number(v) >= 0 ? 'pos' : 'neg'; }
function filtered() { const q=filterEl.value.trim().toLowerCase(); return records.filter(r => !q || r.id.toLowerCase().includes(q) || r.label.toLowerCase().includes(q)); }
function renderMetrics(rows) {
  const bestReward = [...rows].sort((a,b)=>b.cumReward-a.cumReward)[0];
  const bestGain = [...rows].sort((a,b)=>b.cumGain-a.cumGain)[0];
  const qwen = rows.find(r=>r.id.includes('qwen'));
  document.getElementById('metrics').innerHTML = [
    ['Systems', rows.length, 'loaded artifacts'],
    ['Best Cum Reward', fmt(bestReward?.cumReward), bestReward?.id || 'n/a'],
    ['Best Cum Gain', signed(bestGain?.cumGain), bestGain?.id || 'n/a'],
    ['Qwen Cum Reward / Gain', qwen ? `${fmt(qwen.cumReward)} / ${signed(qwen.cumGain)}` : 'n/a', qwen ? `std ${fmt(qwen.cumRewardStd)}` : 'not loaded'],
  ].map(m => `<div class="card"><div class="metric-label">${m[0]}</div><div class="metric-value">${m[1]}</div><div class="metric-sub">${m[2]}</div></div>`).join('');
}
function renderTable(rows) {
  const sorted = [...rows].sort((a,b)=> {
    const av=a[sortKey], bv=b[sortKey];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv || '');
    return sortDir * ((Number(av ?? -Infinity)) - (Number(bv ?? -Infinity)));
  });
  document.getElementById('rows').innerHTML = sorted.map(r => `<tr>
    <td><div class="name">${r.id}</div><div class="sub">${r.label}</div></td>
    <td>${signed(r.cumReward)}</td><td>${fmt(r.cumRewardStd)}</td>
    <td class="${cls(r.cumGain)}">${signed(r.cumGain)}</td><td>${fmt(r.cumGainStd)}</td>
    <td>${r.runs}</td><td>${fmt(r.avgResponseSeconds,2)}s</td><td>${r.schedule || 'n/a'}</td>
  </tr>`).join('');
}
function renderChart(rows, field, svgId, legendId) {
  const svg=document.getElementById(svgId); const W=svg.clientWidth||1200, H=svg.clientHeight||330; const pad={l:42,r:14,t:18,b:30};
  const series=rows.map((r,i)=>({...r,color:colorById.get(r.id)||colors[i%colors.length], values:r[field]||[]}));
  const visibleSeries=series.filter(s=>!hiddenSeries.has(s.id));
  const vals=visibleSeries.flatMap(s=>s.values.filter(v=>v!==null && v!==undefined && !Number.isNaN(Number(v))).map(Number));
  const maxX=Math.max(...series.map(s=>s.values.length), 1)-1; const minY=Math.min(...vals, 0); const maxY=Math.max(...vals, 1);
  const x=i=>pad.l+(i/Math.max(maxX,1))*(W-pad.l-pad.r); const y=v=>H-pad.b-((Number(v)-minY)/Math.max(maxY-minY,1e-9))*(H-pad.t-pad.b);
  const grid=[0,.25,.5,.75,1].map(t=> { const yy=pad.t+t*(H-pad.t-pad.b); return `<line x1="${pad.l}" y1="${yy}" x2="${W-pad.r}" y2="${yy}" stroke="#e5e7eb"/><text x="8" y="${yy+4}" font-size="11" fill="#667085">${fmt(maxY-(maxY-minY)*t,2)}</text>`; }).join('');
  const paths=visibleSeries.map(s=> { const pts=s.values.map((v,i)=>v==null?null:[x(i),y(v)]).filter(Boolean); if(!pts.length) return ''; return `<path d="${pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${s.color}" stroke-width="2"/>`; }).join('');
  const empty=visibleSeries.length ? '' : `<text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="13" fill="#667085">All series hidden. Click a legend item to show lines.</text>`;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`); svg.innerHTML=`${grid}<line x1="${pad.l}" y1="${H-pad.b}" x2="${W-pad.r}" y2="${H-pad.b}" stroke="#98a2b3"/>${paths}${empty}`;
  const legend=document.getElementById(legendId);
  const ctl=`<button type="button" class="legend-item legend-ctl" data-legend-all="1">Select all</button><button type="button" class="legend-item legend-ctl" data-legend-none="1">Deselect all</button>`;
  legend.innerHTML=ctl+series.map(s=>`<button type="button" class="legend-item ${hiddenSeries.has(s.id)?'hidden':''}" data-series-id="${escapeHtml(s.id)}"><span class="swatch" style="background:${s.color}"></span>${escapeHtml(s.id)}</button>`).join('');
  legend.querySelectorAll('[data-series-id]').forEach(button=>button.addEventListener('click',()=>{ const id=button.getAttribute('data-series-id'); hiddenSeries.has(id) ? hiddenSeries.delete(id) : hiddenSeries.add(id); render(); }));
  legend.querySelector('[data-legend-all]').addEventListener('click',()=>{ series.forEach(s=>hiddenSeries.delete(s.id)); render(); });
  legend.querySelector('[data-legend-none]').addEventListener('click',()=>{ series.forEach(s=>hiddenSeries.add(s.id)); render(); });
}
function render() { const rows=filtered(); renderMetrics(rows); renderTable(rows); renderChart(rows,'meanRewardByIndex','rewardChart','rewardLegend'); renderChart(rows,'meanGainByIndex','gainChart','gainLegend'); }
filterEl.addEventListener('input', render);
document.querySelectorAll('th[data-sort]').forEach(th=>th.addEventListener('click',()=>{ sortKey=th.dataset.sort; sortDir = sortKey === 'label' ? 1 : -1; render(); }));
document.getElementById('sortReward').onclick=()=>{ sortKey='cumReward'; sortDir=-1; document.getElementById('sortReward').classList.add('active'); document.getElementById('sortGain').classList.remove('active'); render(); };
document.getElementById('sortGain').onclick=()=>{ sortKey='cumGain'; sortDir=-1; document.getElementById('sortGain').classList.add('active'); document.getElementById('sortReward').classList.remove('active'); render(); };
render();
</script>
